<!DOCTYPE html>

<html class="dark" lang="en" style="width: 390px; height: 1764px; overflow: hidden; position: relative;"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ustaad Connect - Provider Portal Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@100..900&display=swap');
        
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #0b141a; /* WhatsApp Dark Background */
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            background: #1f2c34; /* WhatsApp Card Background */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#00a884", /* WhatsApp Emerald Green */
                      "background": "#0b141a",
                      "surface": "#1f2c34",
                      "surface-container": "#202c33",
                      "on-surface": "#ffffff",
                      "on-surface-variant": "#8696a0",
                      "outline-variant": "#2a3942",
                      "primary-container": "#00a884"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "20px",
                      "xl": "32px",
                      "sm": "12px",
                      "lg": "24px",
                      "base": "8px",
                      "md": "16px",
                      "xs": "4px"
              },
              "fontFamily": {
                      "body-sm": ["Public Sans"],
                      "label-sm": ["Public Sans"],
                      "label-md": ["Public Sans"],
                      "body-lg": ["Public Sans"],
                      "body-md": ["Public Sans"],
                      "headline-md": ["Public Sans"],
                      "headline-lg-mobile": ["Public Sans"],
                      "headline-lg": ["Public Sans"]
              },
              "fontSize": {
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-background text-on-surface min-h-screen selection:bg-primary/30 selection:text-white">
<header class="w-full top-0 sticky z-50 bg-[#1f2c34] flex items-center justify-between px-container-padding py-md border-b border-white/5">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-primary font-headline-md text-headline-md" data-icon="handyman">handyman</span>
<h1 class="font-headline-md text-headline-md text-white tracking-tight">Ustaad Connect</h1>
</div>
</header>
<main class="max-w-md mx-auto px-container-padding pb-xl pt-lg flex flex-col gap-xl no-scrollbar overflow-y-auto">
<!-- Welcome Header -->
<section class="flex flex-col gap-xs">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-white">Provider Portal</h2>
<p class="font-body-md text-body-md text-[#8696a0]">Login or register to start accepting jobs</p>
</section>
<!-- Login Card -->
<div class="glass-card rounded-xl p-md flex flex-col gap-lg shadow-xl">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]" for="login-phone">Phone Number</label>
<div class="relative group">
<input class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white placeholder-[#8696a0]/50 focus:outline-none focus:border-primary transition-colors" id="login-phone" placeholder="e.g. 923001234567" type="tel"/>
</div>
</div>
<button class="w-full bg-primary text-white font-label-md text-label-md py-md rounded-lg active:scale-95 transition-all duration-100 flex items-center justify-center gap-base">
            Login
        </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="h-[1px] flex-1 bg-[#2a3942]"></div>
<span class="font-label-sm text-label-sm text-[#8696a0] uppercase tracking-widest">OR</span>
<div class="h-[1px] flex-1 bg-[#2a3942]"></div>
</div>
<!-- Registration Section -->
<section class="flex flex-col gap-lg">
<h3 class="font-headline-md text-headline-md text-white">Create New Account</h3>
<div class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">Full Name</label>
<input class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white placeholder-[#8696a0]/50 focus:outline-none focus:border-primary transition-colors" placeholder="Enter your full name" type="text"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">Phone Number</label>
<input class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white placeholder-[#8696a0]/50 focus:outline-none focus:border-primary transition-colors" placeholder="e.g. 923001234567" type="tel"/>
</div>
<!-- CNIC -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">CNIC (13 digits)</label>
<input class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white placeholder-[#8696a0]/50 focus:outline-none focus:border-primary transition-colors" placeholder="e.g. 4210112345678" type="text"/>
</div>
<!-- Service Type Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">Service Type</label>
<div class="relative">
<select class="w-full appearance-none bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white focus:outline-none focus:border-primary transition-colors">
<option value="plumber">Plumber</option>
<option value="electrician">Electrician</option>
<option value="ac_repair">AC Repair</option>
<option value="carpenter">Carpenter</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-[#8696a0]" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Experience -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">Experience (Years)</label>
<input class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white placeholder-[#8696a0]/50 focus:outline-none focus:border-primary transition-colors" placeholder="e.g. 5" type="number"/>
</div>
<!-- City -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">City</label>
<input class="w-full bg-[#202c33]/50 border border-[#2a3942]/50 rounded-lg px-md py-base font-body-md text-body-md text-[#8696a0]" readonly="" type="text" value="Peshawar"/>
</div>
<!-- Visit Fee -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">Visit Fee (PKR)</label>
<input class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white focus:outline-none focus:border-primary transition-colors" type="number" value="500"/>
</div>
<!-- Location Coordinates -->
<div class="flex flex-col gap-sm">
<label class="font-label-sm text-label-sm text-[#8696a0]">Location</label>
<div class="relative w-full h-40 rounded-xl overflow-hidden border border-[#2a3942] bg-[#202c33] group">
<img alt="Map Location Selection" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/60 to-transparent pointer-events-none"></div>
<button class="absolute bottom-md left-1/2 -translate-x-1/2 whitespace-nowrap bg-primary text-white font-label-md text-label-sm px-lg py-base rounded-full shadow-lg active:scale-95 transition-all flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">location_on</span>
                        Share Current Location
                    </button>
</div>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-[#8696a0]">Bio / About You</label>
<textarea class="w-full bg-[#202c33] border border-[#2a3942] rounded-lg px-md py-base font-body-md text-body-md text-white placeholder-[#8696a0]/50 focus:outline-none focus:border-primary transition-colors min-h-[100px]" placeholder="Tell customers about your expertise and skills..."></textarea>
</div>
<button class="w-full bg-primary text-white font-label-md text-label-md py-md rounded-lg active:scale-95 transition-all duration-100 flex items-center justify-center gap-base mt-base">
            Create Account
        </button>
</section>
<!-- Aesthetic Footer Image -->
<div class="w-full h-48 rounded-xl overflow-hidden mt-xl relative group">
<img alt="Professional Handyman Tools" class="w-full h-full object-cover grayscale opacity-20 group-hover:opacity-40 transition-all duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB30qvQI2PV5Fv6gXqb_xsjmshJ8Z_VKtkNzO9mbayCetZxT_nOB_hQk8O2nMC-2LnpfKoVcpYatUwhFxu0amcSGpmYJFOd9WToqwhWSQro8M4xkbb-U5k0ejYaNME7wAT8xybzgtiHnuoFmtz-EMD33vtquFmZ5V8eIjZ8Tlos9LTxsHg7aDIwaO3feRKaGnOj92uDrzoyQtdU8rSr8H8thXwRB1cNoFMp-2lPQU9pdAaiWmjOL3F-PDBeHsjGFc_vbFw2iH8lYIfl"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
<div class="absolute bottom-md left-md">
<p class="font-label-sm text-label-sm text-primary">Join our network of 500+ professionals</p>
</div>
</div>
</main>
<script>
    // Micro-interactions
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('mousedown', () => {
            btn.classList.add('scale-95');
        });
        btn.addEventListener('mouseup', () => {
            btn.classList.remove('scale-95');
        });
        btn.addEventListener('mouseleave', () => {
            btn.classList.remove('scale-95');
        });
    });

    // Simple label focus logic
    const inputs = document.querySelectorAll('input, select, textarea');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            const label = input.closest('.flex-col').querySelector('label');
            if (label) {
                label.style.color = '#00a884';
            }
        });
        input.addEventListener('blur', () => {
            const label = input.closest('.flex-col').querySelector('label');
            if (label) {
                label.style.color = '#8696a0';
            }
        });
    });
</script>
</body></html>
