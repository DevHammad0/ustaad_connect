<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #0b1326;
            color: #dae2fd;
            margin: 0;
            overflow: hidden;
            min-height: max(884px, 100dvh);
        }

        /* Radar Ripples */
        .radar-ring {
            position: absolute;
            border: 1px solid rgba(173, 198, 255, 0.4);
            border-radius: 50%;
            animation: expand-ring 4s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }

        @keyframes expand-ring {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Radar Scanner Sweep */
        .scanner-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(173, 198, 255, 0.3) 0deg, transparent 90deg);
            animation: rotate-sweep 4s linear infinite;
        }

        @keyframes rotate-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating Pin Animation */
        .floating-pin {
            animation: pin-float 3s ease-in-out infinite;
        }

        @keyframes pin-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Online Badge Pulse */
        .online-dot-pulse {
            animation: dot-pulse 2s infinite;
        }

        @keyframes dot-pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Entrance Animations */
        .fade-slide-up {
            animation: fade-slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fade-slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Accessibility: Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            .radar-ring, 
            .scanner-sweep, 
            .floating-pin, 
            .online-dot-pulse, 
            .fade-slide-up,
            .animate-ping {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
            .scanner-sweep {
                display: none;
            }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"inverse-surface": "#dae2fd", background: "#0b1326", "outline-variant": "#424754", "on-secondary": "#213145", "tertiary-fixed": "#ffdcc6", "on-tertiary": "#502400", "on-secondary-fixed": "#0b1c30", primary: "#00a884", outline: "#8c909f", error: "#ffb4ab", "surface-dim": "#0b1326", surface: "#0b1326", "on-error-container": "#ffdad6", "on-primary-container": "#00285d", "on-surface-variant": "#c2c6d6", "surface-container-low": "#131b2e", "on-secondary-fixed-variant": "#38485d", "on-primary-fixed": "#001a42", "secondary-fixed-dim": "#b7c8e1", "primary-container": "#4d8eff", "tertiary-container": "#df7412", "on-background": "#dae2fd", "surface-tint": "#adc6ff", "surface-container-highest": "#2d3449", "tertiary-fixed-dim": "#ffb786", "surface-bright": "#31394d", "surface-container-high": "#222a3d", secondary: "#b7c8e1", "inverse-primary": "#005ac2", "primary-fixed": "#d8e2ff", "surface-container-lowest": "#060e20", "surface-variant": "#2d3449", "secondary-container": "#3a4a5f", "on-primary-fixed-variant": "#004395", "primary-fixed-dim": "#adc6ff", "on-tertiary-container": "#461f00", "on-primary": "#002e6a", "inverse-on-surface": "#283044", "on-surface": "#dae2fd", "on-error": "#690005", "secondary-fixed": "#d3e4fe", "error-container": "#93000a", "on-tertiary-fixed": "#311400", "surface-container": "#171f33", "on-tertiary-fixed-variant": "#723600", tertiary: "#ffb786", "on-secondary-container": "#a9bad3", "background-light": "#f5f8f8", "background-dark": "#0f231f"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {base: "8px", sm: "12px", md: "16px", lg: "24px", xl: "32px", "container-padding": "20px", xs: "4px"}, fontFamily: {"label-md": ["Geist"], "headline-lg": ["Geist"], "body-sm": ["Geist"], "label-sm": ["Geist"], "body-md": ["Geist"], "headline-md": ["Geist"], "headline-lg-mobile": ["Geist"], "body-lg": ["Geist"], headline: ["Public Sans"], display: ["Public Sans"], body: ["Public Sans"], label: ["Public Sans"]}, fontSize: {"label-md": ["14px", {lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600"}], "headline-lg": ["30px", {lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "600"}], "body-sm": ["14px", {lineHeight: "20px", fontWeight: "400"}], "label-sm": ["12px", {lineHeight: "16px", fontWeight: "500"}], "body-md": ["16px", {lineHeight: "24px", fontWeight: "400"}], "headline-md": ["20px", {lineHeight: "28px", fontWeight: "600"}], "headline-lg-mobile": ["24px", {lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600"}], "body-lg": ["18px", {lineHeight: "26px", fontWeight: "400"}]}}}};</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-container-padding py-base fixed top-0 left-0 z-50">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary dark:text-primary active:scale-95 transition-transform duration-200 cursor-pointer">menu</span>
<h1 class="text-headline-md font-headline-md font-bold text-primary dark:text-primary">Ustaad Connect</h1>
</div>
<div class="flex items-center gap-sm">
<div class="flex items-center gap-xs px-sm py-xs bg-surface-container-highest rounded-full border border-outline-variant/30">
<span class="w-2 h-2 bg-green-500 rounded-full online-dot-pulse"></span>
<span class="text-label-md font-label-md text-primary">Online</span>
</div>
<button class="material-symbols-outlined text-on-surface-variant hover:text-error transition-colors p-2 rounded-full active:scale-95">logout</button>
</div>
</header>
<main class="h-screen flex flex-col items-center justify-center px-container-padding pb-24">
<!-- Radar Scanning Centerpiece -->
<div class="relative flex items-center justify-center w-80 h-80 mb-12">
<!-- Multiple Concentric Ripples -->
<div class="radar-ring w-48 h-48"></div>
<div class="radar-ring w-48 h-48" style="animation-delay: 1s;"></div>
<div class="radar-ring w-48 h-48" style="animation-delay: 2s;"></div>
<div class="radar-ring w-48 h-48" style="animation-delay: 3s;"></div>
<!-- Radar Background/Grid effect -->
<div class="absolute w-64 h-64 rounded-full border border-primary/10 bg-primary/5"></div>
<div class="absolute w-32 h-32 rounded-full border border-primary/5"></div>
<!-- Rotating Scanner Line/Sweep -->
<div class="scanner-sweep w-64 h-64"></div>
<!-- Floating Pin Centerpiece -->
<div class="relative z-10 w-16 h-16 bg-primary-container rounded-full flex items-center justify-center shadow-lg shadow-primary/20 floating-pin">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Job Status Typography -->
<div class="text-center max-w-sm space-y-md fade-slide-up" style="animation-delay: 0.2s;">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface tracking-tight">Looking for jobs...</h2>
<p class="text-body-sm font-body-sm text-on-surface-variant leading-relaxed">
                Stay online to receive requests. We will alert you when a new customer booking is available.
            </p>
</div>
<!-- Action Button -->
<button class="mt-xl border border-primary text-primary px-xl py-md rounded-full font-label-md text-label-md hover:bg-primary/10 active:scale-95 transition-all duration-200 uppercase tracking-widest fade-slide-up" style="animation-delay: 0.4s;">
            Force Poll Now
        </button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container dark:bg-surface-container shadow-lg rounded-t-xl">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1 active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-label-sm font-label-sm">Home</span>
</a>
<!-- Jobs -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-all active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined">work</span>
<span class="text-label-sm font-label-sm">Jobs</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-all active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-label-sm font-label-sm">Profile</span>
</a>
</nav>
<!-- Micro-interaction for feedback -->
<script>
        document.querySelector('button').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerText;
            btn.innerText = 'Polling...';
            btn.classList.add('opacity-70');
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerText = 'Updated';
                btn.classList.remove('opacity-70');
                btn.classList.add('bg-primary/20');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('bg-primary/20');
                    btn.disabled = false;
                }, 1500);
            }, 1000);
        });
    </script>
</body></html>
